/* ── Zoom/pan clamp helper ───────────────────────────────── */
function clampAxis(nval, viewDim, scaledDim) {
  if (scaledDim <= viewDim) return (viewDim - scaledDim) / 2; // center when smaller than viewport
  return Math.max(viewDim - scaledDim, Math.min(0, nval));
}

/* ── Heatmap drawing ─────────────────────────────────────── */
function intensityColor(t) {
  const stops = [
    { p: 0.00, r: 109, g:  40, b: 217 },
    { p: 0.20, r:  37, g:  99, b: 235 },
    { p: 0.40, r:  34, g: 197, b:  94 },
    { p: 0.60, r: 234, g: 179, b:   8 },
    { p: 0.80, r: 249, g: 115, b:  22 },
    { p: 1.00, r: 239, g:  68, b:  68 },
  ];
  let lo = stops[0], hi = stops[stops.length - 1];
  for (let i = 0; i < stops.length - 1; i++) {
    if (t >= stops[i].p && t <= stops[i + 1].p) { lo = stops[i]; hi = stops[i + 1]; break; }
  }
  const range = hi.p - lo.p || 1;
  const loc = (t - lo.p) / range;
  return {
    r: Math.round(lo.r + (hi.r - lo.r) * loc),
    g: Math.round(lo.g + (hi.g - lo.g) * loc),
    b: Math.round(lo.b + (hi.b - lo.b) * loc),
  };
}

function drawHeatmap(canvas, grid) {
  if (!canvas || !grid) return 0;
  const ctx = canvas.getContext('2d');
  canvas.width  = MAP_SIZE;
  canvas.height = MAP_SIZE;
  ctx.clearRect(0, 0, MAP_SIZE, MAP_SIZE);
  let max = 0, total = 0;
  for (const row of grid) {
    for (const visitCount of row) {
      if (visitCount > max) max = visitCount;
      total += visitCount;
    }
  }
  if (max === 0) return 0;
  ctx.globalCompositeOperation = 'lighter';
  for (let r = 0; r < grid.length; r++) {
    for (let c = 0; c < grid[r].length; c++) {
      const visitCount = grid[r][c];
      if (visitCount === 0) continue;
      const density = Math.log(visitCount + 1) / Math.log(max + 1);
      const { r: cr, g: cg, b: cb } = intensityColor(density);
      const alpha = Math.min(0.15 + density * 0.55, 0.75);
      const x  = c * CELL_PX;
      const y  = r * CELL_PX;
      const pcx = x + CELL_PX / 2;
      const pcy = y + CELL_PX / 2;
      const radius = CELL_PX * (1.35 + density * 1.08);
      const grad = ctx.createRadialGradient(pcx, pcy, 0, pcx, pcy, radius);
      grad.addColorStop(0,    `rgba(${cr},${cg},${cb},${alpha.toFixed(3)})`);
      grad.addColorStop(0.48, `rgba(${cr},${cg},${cb},${(alpha * 0.65).toFixed(3)})`);
      grad.addColorStop(1,    `rgba(${cr},${cg},${cb},0)`);
      ctx.fillStyle = grad;
      ctx.fillRect(pcx - radius, pcy - radius, radius * 2, radius * 2);
    }
  }
  return total;
}

/* ── App ─────────────────────────────────────────────────── */
function App() {
  const shellRef  = useRef(null);
  const innerRef  = useRef(null);
  const canvasRef = useRef(null);
  const zoomRef   = useRef(1);
  const txRef     = useRef(0);
  const tyRef     = useRef(0);
  const dragRef        = useRef({ active:false, startX:0, startY:0, startTx:0, startTy:0 });
  const pinchDistRef       = useRef(null);
  const activePointersRef  = useRef(new Map());
  const tapRef             = useRef(null);
  const carOrdinalsRef = useRef({});
  const carGridRef     = useRef(null);
  const gridRef        = useRef(null);
  const lastHoverCell  = useRef({ row:-1, col:-1 });

  const [windowWidth, setWindowWidth]   = useState(window.innerWidth);
  const isMobile = windowWidth < 768;
  const [activeFilter, setActiveFilter] = useState('all');
  const [sidebarOpen, setSidebarOpen]   = useState(false);
  const [totalCount, setTotalCount]     = useState(0);
  const [status, setStatus]             = useState('loading');
  const [errorMsg, setErrorMsg]         = useState('');
  const [popupState, setPopupState]     = useState({ visible:false, x:0, y:0, cars:[] });
  const [leaderboard, setLeaderboard]   = useState([]);

  /* Center map before first paint */
  useLayoutEffect(() => {
    const shell = shellRef.current;
    const inner = innerRef.current;
    if (!shell || !inner) return;
    const W = shell.offsetWidth, H = shell.offsetHeight, D = inner.offsetWidth;
    const tx = (W - D) / 2, ty = (H - D) / 2;
    txRef.current = tx; tyRef.current = ty;
    inner.style.transform = `translate(${tx}px,${ty}px) scale(1)`;
  }, []);

  /* Load car ordinals lookup */
  useEffect(function() {
    fetch('./car-ordinals.json')
      .then(function(response) { return response.json(); })
      .then(function(data) { carOrdinalsRef.current = data; })
      .catch(function(error) { console.error('Failed to load car ordinals:', error); });
  }, []);

  /* Handle click on map — show car popup for cells with heat */
  const handleMapClick = useCallback(function(clientX, clientY) {
    const inner = innerRef.current;
    if (!inner) return;
    const tx = txRef.current;
    const ty = tyRef.current;
    const zoom = zoomRef.current;
    const displaySize = inner.offsetWidth;
    const col = Math.floor(((clientX - tx) / zoom) * GRID_SIZE / displaySize);
    const row = Math.floor(((clientY - ty) / zoom) * GRID_SIZE / displaySize);
    if (col < 0 || col >= GRID_SIZE || row < 0 || row >= GRID_SIZE) {
      setPopupState({ visible:false, x:0, y:0, cars:[] });
      return;
    }
    const currentGrid = gridRef.current;
    const currentCarGrid = carGridRef.current;
    if (!currentGrid || !currentCarGrid || currentGrid[row][col] === 0) {
      setPopupState({ visible:false, x:0, y:0, cars:[] });
      return;
    }
    const cellCars = currentCarGrid[row][col];
    const ordinals = Object.keys(cellCars);
    if (ordinals.length === 0) {
      setPopupState({ visible:false, x:0, y:0, cars:[] });
      return;
    }
    ordinals.sort(function(ordinalA, ordinalB) {
      return cellCars[ordinalB].count - cellCars[ordinalA].count;
    });
    const carOrdinalsData = carOrdinalsRef.current;
    const carList = [];
    for (let index = 0; index < ordinals.length; index++) {
      const ordinal = ordinals[index];
      const carName = carOrdinalsData[ordinal];
      if (!carName) continue;
      const carData = cellCars[ordinal];
      carList.push({
        ordinal: ordinal,
        name: carName,
        carClass: carData.car_class,
        performanceIndex: carData.car_performance_index,
        count: carData.count,
      });
      if (carList.length >= 10) break;
    }
    if (carList.length === 0) {
      setPopupState({ visible:false, x:0, y:0, cars:[] });
      return;
    }
    let popupX = clientX + 16;
    if (popupX + 290 > window.innerWidth) {
      popupX = clientX - 306;
    }
    popupX = Math.max(8, popupX);
    let popupY = clientY;
    if (popupY + 260 > window.innerHeight) {
      popupY = window.innerHeight - 260;
    }
    setPopupState({ visible:true, x:popupX, y:popupY, cars:carList });
  }, []);

  /* Non-passive wheel zoom */
  useEffect(() => {
    const shell = shellRef.current;
    if (!shell) return;
    const onWheel = (e) => {
      e.preventDefault();
      const factor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
      const z0 = zoomRef.current;
      const newZ = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, z0 * factor));
      const rect = shell.getBoundingClientRect();
      const cx = e.clientX - rect.left, cy = e.clientY - rect.top;
      const rawTx = cx - (cx - txRef.current) * (newZ / z0);
      const rawTy = cy - (cy - tyRef.current) * (newZ / z0);
      const inner = innerRef.current;
      if (!inner) return;
      const W = shell.offsetWidth, H = shell.offsetHeight, D = inner.offsetWidth;
      const Dz = D * newZ;
      const clx = clampAxis(rawTx, W, Dz);
      const cly = clampAxis(rawTy, H, Dz);
      zoomRef.current = newZ; txRef.current = clx; tyRef.current = cly;
      inner.style.transform = `translate(${clx}px,${cly}px) scale(${newZ})`;
    };
    shell.addEventListener('wheel', onWheel, { passive: false });
    return () => shell.removeEventListener('wheel', onWheel);
  }, []);

  /* Window resize → update isMobile */
  useEffect(() => {
    const onResize = () => setWindowWidth(window.innerWidth);
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);

  /* Pointer drag handlers */
  const onPointerDown = useCallback((e) => {
    e.currentTarget.setPointerCapture(e.pointerId);
    activePointersRef.current.set(e.pointerId, { x: e.clientX, y: e.clientY });
    tapRef.current = { x: e.clientX, y: e.clientY, time: Date.now() };
    if (activePointersRef.current.size === 1) {
      e.currentTarget.style.cursor = 'grabbing';
      dragRef.current = { active: true, startX: e.clientX, startY: e.clientY,
        startTx: txRef.current, startTy: tyRef.current };
    } else if (activePointersRef.current.size === 2) {
      dragRef.current.active = false;
      const pts = [...activePointersRef.current.values()];
      const dx = pts[0].x - pts[1].x;
      const dy = pts[0].y - pts[1].y;
      pinchDistRef.current = Math.sqrt(dx * dx + dy * dy);
    }
  }, []);

  const onPointerMove = useCallback((e) => {
    if (activePointersRef.current.has(e.pointerId)) {
      activePointersRef.current.set(e.pointerId, { x: e.clientX, y: e.clientY });
    }
    const pointerCount = activePointersRef.current.size;

    if (pointerCount === 2) {
      const pts = [...activePointersRef.current.values()];
      const dx = pts[0].x - pts[1].x;
      const dy = pts[0].y - pts[1].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (pinchDistRef.current !== null) {
        const factor = dist / pinchDistRef.current;
        const midX = (pts[0].x + pts[1].x) / 2;
        const midY = (pts[0].y + pts[1].y) / 2;
        const shell = shellRef.current;
        const inner = innerRef.current;
        if (!shell || !inner) return;
        const z0 = zoomRef.current;
        const newZ = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, z0 * factor));
        const rawTx = midX - (midX - txRef.current) * (newZ / z0);
        const rawTy = midY - (midY - tyRef.current) * (newZ / z0);
        const W = shell.offsetWidth, H = shell.offsetHeight, D = inner.offsetWidth;
        const Dz = D * newZ;
        const clx = clampAxis(rawTx, W, Dz);
        const cly = clampAxis(rawTy, H, Dz);
        zoomRef.current = newZ; txRef.current = clx; tyRef.current = cly;
        inner.style.transform = `translate(${clx}px,${cly}px) scale(${newZ})`;
      }
      pinchDistRef.current = dist;
      return;
    }

    pinchDistRef.current = null;

    if (dragRef.current.active) {
      const deltaX = e.clientX - dragRef.current.startX;
      const deltaY = e.clientY - dragRef.current.startY;
      const z = zoomRef.current;
      const rawTx = dragRef.current.startTx + deltaX;
      const rawTy = dragRef.current.startTy + deltaY;
      const shell = shellRef.current, inner = innerRef.current;
      if (!shell || !inner) return;
      const W = shell.offsetWidth, H = shell.offsetHeight, D = inner.offsetWidth;
      const Dz = D * z;
      const clx = clampAxis(rawTx, W, Dz);
      const cly = clampAxis(rawTy, H, Dz);
      txRef.current = clx; tyRef.current = cly;
      inner.style.transform = `translate(${clx}px,${cly}px) scale(${z})`;
      return;
    }

    if (e.pointerType === 'touch') return;
    const inner = innerRef.current;
    if (!inner) return;
    const col = Math.floor(((e.clientX - txRef.current) / zoomRef.current) * GRID_SIZE / inner.offsetWidth);
    const row = Math.floor(((e.clientY - tyRef.current) / zoomRef.current) * GRID_SIZE / inner.offsetWidth);
    if (col !== lastHoverCell.current.col || row !== lastHoverCell.current.row) {
      lastHoverCell.current = { col, row };
      handleMapClick(e.clientX, e.clientY);
    }
  }, [handleMapClick]);

  const onPointerUp = useCallback((e) => {
    const tap = tapRef.current;
    const isTap = tap && e.pointerType === 'touch' &&
      Math.abs(e.clientX - tap.x) < 12 && Math.abs(e.clientY - tap.y) < 12 &&
      (Date.now() - tap.time) < 400;

    e.currentTarget.releasePointerCapture(e.pointerId);
    activePointersRef.current.delete(e.pointerId);
    if (activePointersRef.current.size < 2) {
      pinchDistRef.current = null;
    }
    if (activePointersRef.current.size === 1) {
      const [remaining] = activePointersRef.current.values();
      dragRef.current = { active: true, startX: remaining.x, startY: remaining.y,
        startTx: txRef.current, startTy: tyRef.current };
    }
    if (activePointersRef.current.size === 0) {
      e.currentTarget.style.cursor = 'grab';
      dragRef.current.active = false;
      tapRef.current = null;
      if (isTap) handleMapClick(e.clientX, e.clientY);
    }
  }, [handleMapClick]);

  /* Zoom button helpers */
  const zoomAtCenter = useCallback((factor) => {
    const shell = shellRef.current, inner = innerRef.current;
    if (!shell || !inner) return;
    const z0 = zoomRef.current;
    const newZ = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, z0 * factor));
    const cx = shell.offsetWidth / 2, cy = shell.offsetHeight / 2;
    const rawTx = cx - (cx - txRef.current) * (newZ / z0);
    const rawTy = cy - (cy - tyRef.current) * (newZ / z0);
    const W = shell.offsetWidth, H = shell.offsetHeight, D = inner.offsetWidth;
    const Dz = D * newZ;
    const clx = clampAxis(rawTx, W, Dz);
    const cly = clampAxis(rawTy, H, Dz);
    zoomRef.current = newZ; txRef.current = clx; tyRef.current = cly;
    inner.style.transform = `translate(${clx}px,${cly}px) scale(${newZ})`;
  }, []);

  const zoomIn  = useCallback(() => zoomAtCenter(1.5), [zoomAtCenter]);
  const zoomOut = useCallback(() => zoomAtCenter(1 / 1.5), [zoomAtCenter]);
  const resetZoom = useCallback(() => {
    const shell = shellRef.current, inner = innerRef.current;
    if (!shell || !inner) return;
    const W = shell.offsetWidth, H = shell.offsetHeight, D = inner.offsetWidth;
    zoomRef.current = 1;
    txRef.current = (W - D) / 2;
    tyRef.current = (H - D) / 2;
    inner.style.transform = `translate(${txRef.current}px,${tyRef.current}px) scale(1)`;
  }, []);

  /* Fetch */
  const fetchHeatmap = useCallback(async () => {
    setStatus('loading');
    setErrorMsg('');
    try {
      let gridUrl;
      if (activeFilter === 'all') {
        gridUrl = GRID_URL_ALL_TIME;
      } else if (activeFilter === 'week') {
        gridUrl = GRID_URL_WEEK;
      } else {
        gridUrl = GRID_URL_DAY;
      }
      let leaderboardUrl;
      if (activeFilter === 'all') {
        leaderboardUrl = LEADERBOARD_URL_ALL_TIME;
      } else if (activeFilter === 'week') {
        leaderboardUrl = LEADERBOARD_URL_WEEK;
      } else {
        leaderboardUrl = LEADERBOARD_URL_DAY;
      }
      const res = await fetch(gridUrl, { cache:'no-store' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      if (!data || !Array.isArray(data.grid)) throw new Error('Malformed response');
      gridRef.current = data.grid;
      carGridRef.current = data.car_grid || null;
      const total = drawHeatmap(canvasRef.current, data.grid);
      setTotalCount(total);
      const leaderboardRes = await fetch(leaderboardUrl, { cache:'no-store' });
      if (leaderboardRes.ok) {
        const leaderboardData = await leaderboardRes.json();
        let leaderboardKey;
        if (activeFilter === 'all') {
          leaderboardKey = 'all-time-leaderboard';
        } else if (activeFilter === 'week') {
          leaderboardKey = 'week-leaderboard';
        } else {
          leaderboardKey = 'day-leaderboard';
        }
        setLeaderboard(leaderboardData[leaderboardKey] || []);
      }
      setStatus('ready');
    } catch (err) {
      console.error(err);
      setErrorMsg(err.message || 'Unknown error');
      setStatus('error');
    }
  }, [activeFilter]);

  useEffect(() => { fetchHeatmap(); }, [fetchHeatmap]);

  const loading = status === 'loading';

  return (
    <div ref={shellRef} style={{ position:'relative', width:'100vw', height:'100dvh',
      overflow:'hidden', background:'#2a3f4f' }}>

      {/* Draggable map layer */}
      <div ref={innerRef}
        style={{ position:'absolute', top:0, left:0,
          width:'max(100vw,100vh)', height:'max(100vw,100vh)',
          transformOrigin:'0 0', willChange:'transform', cursor:'grab', touchAction:'none',
          background:"url('./japan-map.jpg') center/cover no-repeat" }}
        onPointerDown={onPointerDown}
        onPointerMove={onPointerMove}
        onPointerUp={onPointerUp}
        onPointerCancel={onPointerUp}>
        {/* Heatmap canvas — no CSS filter, 6144×6144 intrinsic */}
        <canvas ref={canvasRef} width={MAP_SIZE} height={MAP_SIZE}
          style={{ position:'absolute', inset:0, width:'100%', height:'100%',
            mixBlendMode:'screen', pointerEvents:'none',
            opacity: status === 'ready' ? 1 : 0, transition:'opacity .4s' }}
          aria-hidden="true" />
        {/* Sakura atmosphere */}
        <div style={{ position:'absolute', inset:0, pointerEvents:'none', background:`
          radial-gradient(ellipse 62% 55% at 0% 0%,rgba(255,192,203,.11),transparent 55%),
          radial-gradient(ellipse 55% 50% at 100% 0%,rgba(255,192,203,.09),transparent 55%),
          radial-gradient(ellipse 80% 35% at 50% 100%,rgba(255,210,175,.07),transparent 60%)
        `}} />
      </div>

      {/* Sakura petals */}
      <Petals />

      {/* Washi top fade */}
      <div style={{ position:'absolute', top:0, left:0, right:0, height:130,
        background:'linear-gradient(to bottom,rgba(250,248,243,.65),transparent)',
        pointerEvents:'none', zIndex:4 }} />

      {/* Collapsible sidebar */}
      <Sidebar open={sidebarOpen} onClose={() => setSidebarOpen(false)}
        active={activeFilter} onChange={setActiveFilter}
        count={totalCount} onRefresh={fetchHeatmap} loading={loading}
        leaderboard={leaderboard} carOrdinals={carOrdinalsRef.current} />

      {/* Top bar */}
      <div style={{ position:'absolute', top:0, left:0, right:0, padding:'18px 24px',
        display:'flex', alignItems:'center', gap:16, zIndex:10 }}>
        <button onClick={() => setSidebarOpen(o => !o)}
          style={{ width:44, height:44, border:`1.5px solid ${T.border}`, borderRadius:10,
            background:'rgba(255,255,255,.9)', color:T.ink, fontSize:19, cursor:'pointer',
            display:'flex', alignItems:'center', justifyContent:'center',
            backdropFilter:'blur(10px)', flexShrink:0, transition:'filter .12s' }}
          title={sidebarOpen ? 'Close panel' : 'Open panel'}>
          {sidebarOpen ? '←' : '☰'}
        </button>
        <Wordmark />
        <div style={{ flex:1 }} />
        {!isMobile && <FilterPills active={activeFilter} onChange={setActiveFilter} />}
        {!isMobile && <RefreshBtn onClick={fetchHeatmap} loading={loading} />}
      </div>

      {/* Mobile filter row */}
      {isMobile && (
        <div style={{ position:'absolute', top:80, left:0, right:0,
          display:'flex', justifyContent:'center', alignItems:'center', gap:8,
          padding:'0 16px 10px', zIndex:10 }}>
          <FilterPills active={activeFilter} onChange={setActiveFilter} />
          <RefreshBtn onClick={fetchHeatmap} loading={loading} />
        </div>
      )}

      {/* Bottom-left HUD: stats + legend when sidebar closed */}
      {!sidebarOpen && (
        <div style={{ position:'absolute', bottom: isMobile ? 36 : 28, left:28,
          display:'flex', flexDirection:'column', gap:10, zIndex:5 }}>
          <StatsCard count={totalCount} />
          <Legend />
        </div>
      )}
      {/* Legend only, shifted right of sidebar when open */}
      {sidebarOpen && (
        <div style={{ position:'absolute', bottom: isMobile ? 36 : 28, left:320, zIndex:5 }}>
          <Legend />
        </div>
      )}

      {/* Zoom controls — always bottom-right */}
      <div style={{ position:'absolute', bottom: isMobile ? 36 : 28, right:28, zIndex:5 }}>
        <ZoomCtrl onIn={zoomIn} onOut={zoomOut} onReset={resetZoom} />
      </div>

      {/* Car popup */}
      {popupState.visible && (
        <CarPopup
          cars={popupState.cars}
          x={popupState.x}
          y={popupState.y}
          onClose={function() { setPopupState({ visible:false, x:0, y:0, cars:[] }); }}
        />
      )}

      {/* Pan hint */}
      <div style={{ position:'absolute', bottom: isMobile ? 14 : 10, left:'50%',
        transform:'translateX(-50%)', zIndex:4,
        fontFamily:'Outfit,sans-serif', fontSize:9, letterSpacing:'.1em',
        textTransform:'uppercase', color:'rgba(255,255,255,0.38)',
        pointerEvents:'none', whiteSpace:'nowrap' }}>
        {isMobile
          ? 'drag to pan · pinch to zoom · tap cell for cars'
          : 'drag to pan · scroll to zoom · click cell for cars'}
      </div>

      {/* Loading overlay */}
      {loading && (
        <div style={{ position:'absolute', inset:0, zIndex:30,
          display:'flex', alignItems:'center', justifyContent:'center',
          pointerEvents:'none' }}>
          <div style={{ background:T.glass, backdropFilter:'blur(14px)',
            border:`1px solid ${T.border}`, borderRadius:10,
            padding:'18px 28px', display:'flex', alignItems:'center', gap:12 }}>
            <div style={{ width:14, height:14, border:`2px solid ${T.border}`,
              borderTopColor:T.torii, borderRadius:'50%',
              animation:'spin .8s linear infinite' }} />
            <span style={{ fontFamily:'Outfit,sans-serif', fontSize:11, fontWeight:500,
              color:T.wood, letterSpacing:'.12em', textTransform:'uppercase' }}>
              Loading telemetry</span>
          </div>
        </div>
      )}

      {/* Error overlay */}
      {status === 'error' && (
        <div style={{ position:'absolute', inset:0, zIndex:30,
          display:'flex', alignItems:'center', justifyContent:'center' }}>
          <div style={{ background:T.glass, backdropFilter:'blur(14px)',
            border:`1px solid ${T.border}`, borderRadius:10,
            padding:'24px 32px', textAlign:'center', maxWidth:320 }}>
            <div style={{ fontFamily:'Spectral,serif', fontWeight:600, fontSize:18,
              color:T.ink, marginBottom:8 }}>Signal lost</div>
            <div style={{ fontFamily:'Outfit,sans-serif', fontSize:11,
              color:T.wood, marginBottom:16 }}>{errorMsg}</div>
            <RefreshBtn onClick={fetchHeatmap} loading={false} />
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
